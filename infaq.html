<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infaq & Donasi</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wheat: #F5DFBB;
      --dark-cyan: #0E9594;
      --stormy-teal: #11686A;
      --terracotta: #F2542D;
      --espresso: #562C2C;
      --bg: #FDF6EC;
      --surface: #FFFFFF;
      --ink: #2B1A1A;
      --ink-soft: #4A2E2E;
      --border: rgba(86,44,44,0.12);
    }

    * { box-sizing: border-box; }
  
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(rgba(253,246,236,0.75), rgba(253,246,236,0.75)),
                  url('Masjid Raya Syeikh Zayeed Solo.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(86,44,44,0.12);
    }

    .badge {
      display: inline-block;
      background: var(--terracotta);
      color: white;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }

    .arabic {
      font-family: 'Amiri', serif;
      font-size: 32px;
      color: var(--stormy-teal);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    h1 {
      text-align: center;
      margin: 0 0 0.5rem;
      font-size: 32px;
      color: var(--ink);
    }

    .subtitle {
      text-align: center;
      color: var(--ink-soft);
      margin-bottom: 1.75rem;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #FFF8EF;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--terracotta);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      word-break: break-word;
    }

    .name {
      text-align: center;
      margin-top: 1rem;
      color: var(--ink-soft);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 1.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--terracotta);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      border: 2px solid var(--terracotta);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 4px 4px 0px var(--stormy-teal);
    }

    .btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 6px 6px 0px var(--stormy-teal);
    }

    .btn.secondary {
      background: transparent;
      color: var(--stormy-teal);
      border-color: var(--dark-cyan);
      box-shadow: none;
    }

    .btn.secondary:hover {
      background: rgba(14,149,148,0.08);
      box-shadow: none;
    }

    @media (max-width: 560px) {
      .card {
        padding: 1.5rem;
      }

      h1 {
        font-size: 28px;
      }

      .value {
        font-size: 18px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Infaq & Donasi</div>
    <div class="arabic">جَزَاكُمُ اللَّهُ خَيْرًا</div>
    <h1>Infaq</h1>
    <p class="subtitle">Apabila Ada Rezeki Lebih, Bisa Sedekahkan Sedikit ke Saya HEHE.</p>

    <div class="list">
      <div class="item">
        <div class="label">Dana</div>
        <div class="value">082333946544</div>
      </div>
      <div class="item">
        <div class="label">GoPay</div>
        <div class="value">082333946544</div>
      </div>
      <div class="item">
        <div class="label">Bank BRI</div>
        <div class="value">6433 0103 5834 530</div>
      </div>
    </div>

    <div class="name"><strong>Atas Nama:</strong> Abyan Farisa</div>

    <div class="actions">
      <a class="btn" href="materi.html">Kembali ke Materi</a>
      <a class="btn secondary" href="index.html">Kembali ke Beranda</a>
    </div>
  </div>
</body>
</html>
